<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KofyKoi - Salas Secretas</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .chat-container {
            height: 400px;
            overflow-y: auto;
            border: 2px solid var(--azul-claro);
            border-radius: 15px;
            padding: 15px;
            background: #fffafa;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-size: cover;
            background-position: center;
        }

        .bubble {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 18px;
            font-size: 0.9rem;
            line-height: 1.4;
            position: relative;
            animation: fadeIn 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        .bubble.mine {
            align-self: flex-end;
            background-color: var(--lavanda);
            color: var(--oscuro-suave);
            border-bottom-right-radius: 4px;
        }

        .bubble.other {
            align-self: flex-start;
            background-color: var(--rosa);
            color: var(--oscuro-suave);
            border-bottom-left-radius: 4px;
        }

        /* Estilo para la fecha y hora */
        .msg-time {
            font-size: 0.65rem;
            opacity: 0.7;
            margin-top: 5px;
            align-self: flex-end; /* La hora se alinea a la derecha dentro de la burbuja */
        }

        .notification-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #6a5acd;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 9999;
            animation: slideIn 0.5s ease-out;
            font-family: 'Quicksand', sans-serif;
            pointer-events: none;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #sala-info {
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">KofyKoi</div>
        <div class="header-user">
            <span id="nav-username">@KofyUser</span>
            <img src="https://i.pravatar.cc/150?u=kofy" class="avatar-sm" id="imgNav">
        </div>
    </header>

    <div class="container" style="grid-template-columns: 1fr;">
        <main>
            <div class="card" id="selector-sala">
                <h3 style="color: var(--morado-deep); margin-bottom: 10px;">Salas Privadas 🗝️</h3>
                <p style="font-size: 0.85rem; margin-bottom: 15px;">Ingresa un código para unirte a una conversación secreta.</p>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="roomCode" placeholder="Código de la sala..." style="border: 2px solid var(--rosa);">
                    <button class="btn-main" onclick="unirseASala()">Entrar</button>
                </div>
            </div>

            <div id="sala-info" class="card">
                <div style="display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-bottom: 10px;">
                    <h4 id="tituloSala" style="color: var(--morado-deep)">Sala: ---</h4>
                    <button class="btn-img" onclick="cambiarNombreSala()" style="font-size: 0.6rem; padding: 4px 8px;">Nombre</button>
                    <button class="btn-img" onclick="document.getElementById('fondoInput').click()" style="font-size: 0.6rem; padding: 4px 8px; background: var(--azul-claro);">Fondo</button>
                    <button class="btn-img" onclick="location.reload()" style="font-size: 0.6rem; padding: 4px 8px;">Salir</button>
                    
                    <input type="file" id="fondoInput" accept="image/*" style="display: none;" onchange="cambiarFondoSala(this)">
                    <input type="file" id="imagenChatInput" accept="image/*" style="display: none;" onchange="prepararImagenChat(this)">
                </div>

                <div id="mensajesPrivados" class="chat-container"></div>

                <div class="chat-input-area">
                    <button class="btn-img" onclick="document.getElementById('imagenChatInput').click()">📷</button>
                    <textarea id="textoPrivado" rows="1" placeholder="Escribe un mensaje..." style="padding: 10px; flex: 1; border-radius: 10px; border: 1px solid #ddd;"></textarea>
                    <button class="btn-main" onclick="enviarMensajeSala()">Enviar</button>
                </div>
            </div>
        </main>

<aside class="sidebar">
    <div class="card profile-card">
        <img src="https://i.pravatar.cc/150?u=kofy" class="avatar-lg" id="imgPerfil">
        <h3 id="nombrePerfil" style="font-size: 0.9rem; margin-top: 5px;">@KofyLover</h3>
        
        <p id="misSeguidoresCount" style="font-size: 0.8rem; font-weight: bold; color: var(--morado-deep);">- seguidores</p>
        
        <p id="bioPerfil" style="font-size: 0.9rem; margin-top: 5px;">Buscando momentos zen y mucho café. ✨</p>
        <br>
        <button class="btn-main" onclick="abrirModal()">Editar Perfil</button>
    </div>
        </aside>
</div>

    <nav class="bottom-nav">
        <button class="nav-item" onclick="location.href='perfil.html'"><span>👤</span><small>Perfil</small></button>
        <button class="nav-item main-btn" onclick="location.href='chats.html'"><span>💬</span><small>Chats</small></button>
        <button class="nav-item" onclick="location.href='index.html'"><span>🏠</span><small>Inicio</small></button>
        <button class="nav-item" onclick="location.href='botellas.html'"><span>🍾</span><small>Mar de Botellas</small></button>
        <button class="nav-item" onclick="location.href='datos.html'"><span>❕</span><small>Info</small></button>
    </nav>

<div id="modalVistaPerfil" class="modal">
    <div class="modal-content">
        <img src="" id="vistaImg" class="avatar-lg">
        <h2 id="vistaNombre" style="margin-top:10px;"></h2>
        <p id="countSeguidores" style="font-weight: bold; color: var(--morado-deep); margin-bottom: 10px;">0 seguidores 🌸</p>
        <p id="vistaBio" style="font-style: italic; color: gray; margin: 15px 0;"></p>
        
        <button id="btnSeguir" class="btn-main" onclick="seguirUsuario(document.getElementById('vistaNombre').textContent)">
            Seguir 🌸
        </button>
        
        <button class="btn-img" onclick="cerrarVista()" style="margin-top: 10px;">Cerrar</button>
    </div>
</div>

</body>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBrUmok_QkwEdO2cmMRryu2GmvvSO5DZ1U",
            authDomain: "kofikoi.firebaseapp.com",
            databaseURL: "https://kofikoi-default-rtdb.firebaseio.com/",
            projectId: "kofikoi",
            storageBucket: "kofikoi.firebasestorage.app",
            messagingSenderId: "27280210890",
            appId: "1:27280210890:web:354c9bf51bfcb6b438ad33",
            measurementId: "G-P7KFPMFHHW"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let salaActual = "";
        let cargaInicialChat = false;
        const miNombre = localStorage.getItem('kofy_nombre') || "@KofyUser";
        const miAvatar = localStorage.getItem('kofy_avatar') || "https://i.pravatar.cc/150?u=kofy";

        function mostrarNotificacion(usuario, mensaje) {
            if (usuario === miNombre) return;
            const toast = document.createElement('div');
            toast.className = 'notification-toast';
            const miniMsg = mensaje ? mensaje.substring(0, 30) : "Envió una imagen 📷";
            toast.innerHTML = `<strong>${usuario}:</strong> ${miniMsg}...`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        function formatearFecha(timestamp) {
            if (!timestamp) return "";
            const fecha = new Date(timestamp);
            const opciones = { hour: '2-digit', minute: '2-digit' };
            // Si el mensaje no es de hoy, añadimos la fecha corta
            if (fecha.toDateString() !== new Date().toDateString()) {
                return fecha.toLocaleDateString([], {day:'2-digit', month:'2-digit'}) + " " + fecha.toLocaleTimeString([], opciones);
            }
            return fecha.toLocaleTimeString([], opciones);
        }

        function dibujarMensaje(id, datos) {
            const contenedor = document.getElementById('mensajesPrivados');
            if (document.getElementById(`msg-${id}`)) return;

            const msgDiv = document.createElement('div');
            const esMio = datos.usuario === miNombre;
            msgDiv.className = `bubble ${esMio ? 'mine' : 'other'}`;
            msgDiv.id = `msg-${id}`;
            
            const horaLeible = formatearFecha(datos.fecha);
            
            msgDiv.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 5px;">
                    <div style="display: flex; align-items: center; gap: 5px;">
                        <img src="${datos.avatar || 'https://i.pravatar.cc/150?u=default'}" style="width: 20px; height: 20px; border-radius: 50%; object-fit: cover;">
                        <span style="font-size: 0.65rem; font-weight: bold; cursor: pointer; color: var(--morado-deep);" 
      onclick="verPerfil('${datos.usuario}', '${datos.avatar}', '${datos.biografia || ''}')">
    ${esMio ? 'Tú' : datos.usuario}
</span>
                    </div>
                    ${esMio ? `<button onclick="borrarMensajePrivado('${id}')" style="background:none; border:none; cursor:pointer; font-size:0.7rem; opacity:0.5;">🗑️</button>` : ''}
                </div>
                ${datos.mensaje ? `<div>${datos.mensaje}</div>` : ''}
                ${datos.imagen ? `<img src="${datos.imagen}" style="width: 100%; border-radius: 10px; margin-top: 5px;">` : ''}
                <span class="msg-time">${horaLeible}</span>
            `;
            
            contenedor.appendChild(msgDiv);
            contenedor.scrollTop = contenedor.scrollHeight;
        }

        function enviarMensajeSala() {
    const texto = document.getElementById('textoPrivado').value.trim();
    const miBio = localStorage.getItem('kofy_bio') || "";
    if (!texto) return;
    database.ref(`chats_privados/${salaActual}/mensajes`).push({
        usuario: miNombre,
        avatar: miAvatar,
        biografia: miBio,
        mensaje: texto,
        fecha: Date.now()
    });
    document.getElementById('textoPrivado').value = "";
}

        function unirseASala() {
            const codigo = document.getElementById('roomCode').value.trim().toLowerCase();
            if (!codigo) return alert("¡Escribe un código! 🌸");
            salaActual = codigo;
            document.getElementById('selector-sala').style.display = "none";
            document.getElementById('sala-info').style.display = "block";

            database.ref(`chats_privados/${salaActual}/configuracion`).on('value', (snap) => {
                const config = snap.val() || {};
                document.getElementById('tituloSala').textContent = config.nombrePersonalizado || "Sala: #" + codigo;
                if (config.fondo) document.getElementById('mensajesPrivados').style.backgroundImage = `url(${config.fondo})`;
            });

            const refMensajes = database.ref(`chats_privados/${salaActual}/mensajes`);
            refMensajes.once('value', () => { cargaInicialChat = true; });
            refMensajes.on('child_added', (snapshot) => {
                const datos = snapshot.val();
                dibujarMensaje(snapshot.key, datos);
                if (cargaInicialChat) mostrarNotificacion(datos.usuario, datos.mensaje);
            });
            refMensajes.on('child_removed', (snapshot) => {
                const el = document.getElementById(`msg-${snapshot.key}`);
                if (el) el.remove();
            });
        }
        
function verPerfil(nombre, avatar, bio) {
    const modal = document.getElementById('modalVistaPerfil');
    if (!modal) return;

    document.getElementById('vistaNombre').textContent = nombre;
    document.getElementById('vistaImg').src = avatar || 'https://i.pravatar.cc/150?u=default';
    document.getElementById('vistaBio').textContent = bio || "Sin biografía aún. ✨";
    
    const btnSeguir = document.getElementById('btnSeguir');
    if (nombre === miNombre) {
        if (btnSeguir) btnSeguir.style.display = "none";
    } else {
        if (btnSeguir) {
            btnSeguir.style.display = "block";
            database.ref(`seguidores/${nombre}/${miNombre}`).once('value', (s) => actualizarBotonSeguir(s.exists()));
        }
    }

    database.ref(`seguidores/${nombre}`).on('value', (s) => {
        const count = document.getElementById('countSeguidores');
        if (count) count.textContent = `${s.numChildren()} seguidores 🌸`;
    });
    modal.style.display = 'flex';
}

function seguirUsuario(nombreSeguido) {
    if (miNombre === nombreSeguido) return;
    const ref = database.ref(`seguidores/${nombreSeguido}/${miNombre}`);
    ref.get().then((s) => {
        s.exists() ? ref.remove() : ref.set(true);
        actualizarBotonSeguir(!s.exists());
    });
}

function actualizarBotonSeguir(siguiendo) {
    const btn = document.getElementById('btnSeguir');
    if (btn) btn.textContent = siguiendo ? "Siguiendo ✨" : "Seguir 🌸";
}

function cerrarVista() {
    document.getElementById('modalVistaPerfil').style.display = 'none';
}

        // Funciones auxiliares (borrar, fondo, imagen) se mantienen igual...
        function borrarMensajePrivado(id) { if(confirm("¿Borrar?")) database.ref(`chats_privados/${salaActual}/mensajes/${id}`).remove(); }
        function cambiarFondoSala(input) { if (input.files[0]) { const reader = new FileReader(); reader.onload = (e) => database.ref(`chats_privados/${salaActual}/configuracion/fondo`).set(e.target.result); reader.readAsDataURL(input.files[0]); } }
        function cambiarNombreSala() { const n = prompt("Nombre sala:"); if(n) database.ref(`chats_privados/${salaActual}/configuracion/nombrePersonalizado`).set(n); }
        function prepararImagenChat(input) { if (input.files[0]) { const reader = new FileReader(); reader.onload = (e) => { if(confirm("¿Enviar imagen?")) comprimirYEnviarImagen(e.target.result); }; reader.readAsDataURL(input.files[0]); } }
        function comprimirYEnviarImagen(base64) { const img = new Image(); img.src = base64; img.onload = function() { const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d'); canvas.width = 500; canvas.height = img.height * (500 / img.width); ctx.drawImage(img, 0, 0, canvas.width, canvas.height); database.ref(`chats_privados/${salaActual}/mensajes`).push({ usuario: miNombre, avatar: miAvatar, mensaje: "", imagen: canvas.toDataURL('image/jpeg', 0.6), fecha: Date.now() }); }; }
    </script>
</body>
</html>
