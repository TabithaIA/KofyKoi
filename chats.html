<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KofyKoi - Salas Secretas</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .chat-container {
            height: 400px;
            overflow-y: auto;
            border: 2px solid var(--azul-claro);
            border-radius: 15px;
            padding: 15px;
            background: #fffafa;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-size: cover;
            background-position: center;
        }

        .bubble {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 18px;
            font-size: 0.9rem;
            line-height: 1.4;
            position: relative;
            animation: fadeIn 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        .bubble.mine {
            align-self: flex-end;
            background-color: var(--lavanda);
            color: var(--oscuro-suave);
            border-bottom-right-radius: 4px;
        }

        .bubble.other {
            align-self: flex-start;
            background-color: var(--rosa);
            color: var(--oscuro-suave);
            border-bottom-left-radius: 4px;
        }

        .msg-time {
            font-size: 0.65rem;
            opacity: 0.7;
            margin-top: 5px;
            align-self: flex-end;
        }

        .notification-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #6a5acd;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 9999;
            animation: slideIn 0.5s ease-out;
            font-family: 'Quicksand', sans-serif;
            pointer-events: none;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #sala-info {
            display: none;
        }

        .logro-item {
            padding: 10px;
            border-radius: 12px;
            background: #f9f9f9;
            font-size: 0.65rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0.4;
            filter: grayscale(1);
            transition: 0.3s;
        }

        .logro-item.desbloqueado {
            opacity: 1;
            filter: grayscale(0);
            background: var(--rosa);
            color: var(--oscuro-suave);
            transform: scale(1.05);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .logro-icon { 
            font-size: 1.5rem; 
            margin-bottom: 5px; 
        }

        #modalRacha .modal-content {
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">KofyKoi</div>
        <div class="header-user">
            <span id="nav-username">@KofyUser</span>
            <img src="https://i.pravatar.cc/150?u=kofy" class="avatar-sm" id="imgNav">
        </div>
    </header>

    <div class="container" style="grid-template-columns: 1fr;">
        <main>
            <div class="card" id="selector-sala">
                <h3 style="color: var(--morado-deep); margin-bottom: 10px;">Salas Privadas 🗝️</h3>
                <p style="font-size: 0.85rem; margin-bottom: 15px;">Ingresa un código y compartelo con otras personas para empezar una conversación secreta.</p>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="roomCode" placeholder="Código de la sala..." style="border: 2px solid var(--rosa);">
                    <button class="btn-main" onclick="unirseASala()">Entrar</button>
                </div>
            </div>

            <div id="sala-info" class="card">
                <div style="display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-bottom: 10px;">
                    <h4 id="tituloSala" style="color: var(--morado-deep)">Sala: ---</h4>
                    <button class="btn-img" onclick="cambiarNombreSala()" style="font-size: 0.6rem; padding: 4px 8px;">Nombre</button>
                    <button class="btn-img" onclick="document.getElementById('fondoInput').click()" style="font-size: 0.6rem; padding: 4px 8px; background: var(--azul-claro);">Fondo</button>
                    
                    <input type="color" id="miColorPersonalInput" style="display: none;" onchange="guardarMiColor(this.value)">
                    <button class="btn-img" onclick="document.getElementById('miColorPersonalInput').click()" style="font-size: 0.6rem; padding: 4px 8px; background: #FFD1DC; color: #36454F;">Mi Burbuja</button>
                    
                    <button class="btn-img" onclick="abrirModalRacha()" style="font-size: 0.6rem; padding: 4px 8px; background: var(--lavanda);">Racha</button>
                    <button class="btn-img" onclick="location.reload()" style="font-size: 0.6rem; padding: 4px 8px;">Salir</button>
                    
                    <input type="file" id="fondoInput" accept="image/*" style="display: none;" onchange="ajustarFondoSala(this)">
                    <input type="file" id="imagenChatInput" accept="image/*" style="display: none;" onchange="prepararImagenChat(this)">
                </div>

                <div id="mensajesPrivados" class="chat-container"></div>

                <div class="chat-input-area">
                    <button class="btn-img" onclick="document.getElementById('imagenChatInput').click()">📷</button>
                    <textarea id="textoPrivado" rows="1" placeholder="Escribe un mensaje..." style="padding: 10px; flex: 1; border-radius: 10px; border: 1px solid #ddd;"></textarea>
                    <button class="btn-main" onclick="enviarMensajeSala()">Enviar</button>
                </div>
            </div>
        </main>

        <aside class="sidebar">
            <div class="card profile-card">
                <img src="https://i.pravatar.cc/150?u=kofy" class="avatar-lg" id="imgPerfil">
                <h3 id="nombrePerfil" style="font-size: 0.9rem; margin-top: 5px;">@KofyUser</h3>
                <p id="misSeguidoresCount" style="font-size: 0.8rem; font-weight: bold; color: var(--morado-deep);">- seguidores</p>
                <p id="bioPerfil" style="font-size: 0.9rem; margin-top: 5px;">✨</p>
                <p id="miBateria" style="font-size: 0.8rem; color: #4CAF50; font-weight: bold; margin-top: 5px;"></p>
                <br>
                <button class="btn-main" onclick="location.href='perfil.html'">Editar Perfil</button>
            </div>
        </aside>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item" onclick="location.href='perfil.html'"><span>👤</span><small>Perfil</small></button>
        <button class="nav-item main-btn" onclick="location.href='chats.html'"><span>💬</span><small>Chats</small></button>
        <button class="nav-item" onclick="location.href='index.html'"><span>🏠</span><small>Inicio</small></button>
        <button class="nav-item" onclick="location.href='botellas.html'"><span>🍾</span><small>Mar de Botellas</small></button>
        <button class="nav-item" onclick="location.href='datos.html'"><span>❕</span><small>Info</small></button>
    </nav>

    <div id="modalVistaPerfil" class="modal">
        <div class="modal-content">
            <img src="" id="vistaImg" class="avatar-lg">
            <h2 id="vistaNombre" style="margin-top:10px;"></h2>
            <p id="countSeguidores" style="font-weight: bold; color: var(--morado-deep); margin-bottom: 10px;">0 seguidores 🌸</p>
            <p id="vistaBio" style="font-style: italic; color: gray; margin: 15px 0;"></p>
            
            <p id="vistaEstado" style="font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; gap: 5px;">
                <span id="puntoEstado" style="width: 10px; height: 10px; border-radius: 50%; background: gray; display: inline-block;"></span>
                <span id="textoEstado">Cargando estado...</span>
            </p>
            <p id="vistaBateria" style="font-size: 0.85rem; font-weight: bold; margin-bottom: 5px;"></p>
            <p id="vistaPlataforma" style="font-size: 0.75rem; color: #555; margin-bottom: 5px;"></p>
            <p id="vistaClima" style="font-size: 0.75rem; color: #555; margin-bottom: 15px;"></p>

            <button id="btnSeguir" class="btn-main" onclick="toggleSeguir()">Seguir 🌸</button>
            <button class="btn-img" onclick="cerrarVista()" style="margin-top: 10px;">Cerrar</button>
        </div>
    </div>

    <div id="modalRacha" class="modal">
        <div class="modal-content">
            <h3 style="color: var(--morado-deep);">Estado de la Racha 🔥</h3>
            <div id="rachaInfo" style="margin: 15px 0;">
                <p id="rachaDias" style="font-size: 2rem; font-weight: bold;">0 días</p>
                <p id="rachaEstadoText" style="font-size: 0.85rem; color: gray;">La racha no está activa.</p>
            </div>
            <button id="btnSolicitudRacha" class="btn-main" onclick="enviarSolicitudRacha()">Activar Racha 🌸</button>
            <hr style="margin: 20px 0; border: 1px solid var(--rosa);">
            <h4 style="color: var(--morado-deep);">Logros de Racha 🏆</h4>
            <div id="logrosContenedor" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px;"></div>
            <button class="btn-img" onclick="cerrarModalRacha()" style="margin-top: 20px;">Cerrar</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBrUmok_QkwEdO2cmMRryu2GmvvSO5DZ1U",
            authDomain: "kofikoi.firebaseapp.com",
            databaseURL: "https://kofikoi-default-rtdb.firebaseio.com/",
            projectId: "kofikoi",
            storageBucket: "kofikoi.firebasestorage.app",
            messagingSenderId: "27280210890",
            appId: "1:27280210890:web:354c9bf51bfcb6b438ad33",
            measurementId: "G-P7KFPMFHHW"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

            // --- VARIABLES PARA EL SCROLL INFINITO HACIA ARRIBA ---
    let cargandoMasChat = false;
    let primerMensajeFecha = null; // Guarda la fecha del mensaje más viejo en pantalla
    const limiteMensajes = 10;     // Cuántos mensajes se cargan por tanda

        let salaActual = "";
        let cargaInicialChat = false;
        const miNombre = localStorage.getItem('kofy_nombre') || "@KofyUser";
        const miAvatar = localStorage.getItem('kofy_avatar') || "https://i.pravatar.cc/150?u=kofy";
        let miColorBurbuja = localStorage.getItem('kofy_color_burbuja') || ""; 

        // --- INICIALIZACIÓN SIDEBAR ---
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('nav-username').textContent = miNombre;
            document.getElementById('nombrePerfil').textContent = miNombre;
            document.getElementById('imgNav').src = miAvatar;
            document.getElementById('imgPerfil').src = miAvatar;
            document.getElementById('bioPerfil').textContent = localStorage.getItem('kofy_bio') || "✨";
            database.ref(`seguidores/${miNombre}`).on('value', (s) => {
                document.getElementById('misSeguidoresCount').textContent = `${s.numChildren()} seguidores`;
            });
            monitorearBateria();
            enviarMisDatosExtra();
        });

        // --- LÓGICA DE BATERÍA ---
        function monitorearBateria() {
            if ('getBattery' in navigator) {
                navigator.getBattery().then(battery => {
                    const actualizarYEnviar = () => {
                        const nivel = Math.round(battery.level * 100);
                        const estaCargando = battery.charging ? " (⚡ Cargando)" : "";
                        const textoBateria = `🔋 Batería: ${nivel}%${estaCargando}`;
                        document.getElementById('miBateria').textContent = textoBateria;
                        const miID = miNombre.replace(/[.#$[\]]/g, "_");
                        database.ref(`usuarios_bateria/${miID}`).set({
                            nivel: nivel,
                            cargando: battery.charging,
                            ultimaActualizacion: Date.now()
                        });
                    };
                    actualizarYEnviar();
                    battery.addEventListener('levelchange', actualizarYEnviar);
                    battery.addEventListener('chargingchange', actualizarYEnviar);
                });
            } else {
                document.getElementById('miBateria').textContent = "🔋 Batería no disponible";
            }
        }

        // --- LÓGICA DATOS EXTRA (CONEXIÓN, PLATAFORMA, HORA) ---
        function enviarMisDatosExtra() {
            const miID = miNombre.replace(/[.#$[\]]/g, "_");
            const ua = navigator.userAgent;
            let plataforma = "Web";
            if (ua.includes("Android")) plataforma = "Android 📱";
            else if (ua.includes("iPhone") || ua.includes("iPad")) plataforma = "iOS 🍎";
            else if (ua.includes("Windows")) plataforma = "Windows 💻";
            else if (ua.includes("Mac")) plataforma = "Mac 🖥️";

            const userRef = database.ref(`usuarios_extra/${miID}`);
            const actualizarDatos = () => {
                const horaLocal = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                userRef.update({
                    plataforma: plataforma,
                    hora: horaLocal,
                    online: true,
                    ultimaVez: Date.now()
                });
            };

            actualizarDatos();
            setInterval(actualizarDatos, 60000); // Actualiza la hora cada minuto
            userRef.onDisconnect().update({ online: false, ultimaVez: Date.now() });
        }

        function guardarMiColor(color) {
            miColorBurbuja = color;
            localStorage.setItem('kofy_color_burbuja', color);
        }

        function dibujarMensaje(id, datos) {
            const contenedor = document.getElementById('mensajesPrivados');
            if (document.getElementById(`msg-${id}`)) return;
            const msgDiv = document.createElement('div');
            const esMio = datos.usuario === miNombre;
            msgDiv.className = `bubble ${esMio ? 'mine' : 'other'}`;
            msgDiv.id = `msg-${id}`;
            if (datos.colorBurbuja) msgDiv.style.backgroundColor = datos.colorBurbuja;
            msgDiv.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 5px;">
                    <div style="display: flex; align-items: center; gap: 5px;">
                        <img src="${datos.avatar}" style="width: 20px; height: 20px; border-radius: 50%; object-fit: cover;">
                        <span style="font-size: 0.65rem; font-weight: bold; cursor: pointer;" onclick="verPerfil('${datos.usuario}', '${datos.avatar}', '${datos.biografia || ''}')">${esMio ? 'Tú' : datos.usuario}</span>
                    </div>
                    ${esMio ? `<button onclick="borrarMensajePrivado('${id}')" style="background:none; border:none; cursor:pointer; font-size:0.7rem; opacity:0.5;">🗑️</button>` : ''}
                </div>
                ${datos.mensaje ? `<div>${datos.mensaje}</div>` : ''}
                ${datos.imagen ? `<img src="${datos.imagen}" style="width: 100%; border-radius: 10px; margin-top: 5px;">` : ''}
                <span class="msg-time">${new Date(datos.fecha).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
            `;
            contenedor.appendChild(msgDiv);
            contenedor.scrollTop = contenedor.scrollHeight;
        }

        // --- LÓGICA DE SEGUIR Y VER PERFIL ---
        function verPerfil(nombre, avatar, bio) {
            const modal = document.getElementById('modalVistaPerfil');
            const btn = document.getElementById('btnSeguir');
            document.getElementById('vistaNombre').textContent = nombre;
            document.getElementById('vistaImg').src = avatar;
            document.getElementById('vistaBio').textContent = bio || "✨";
            btn.style.display = (nombre === miNombre) ? "none" : "block";

            const userID = nombre.replace(/[.#$[\]]/g, "_");
            
            // Mostrar Batería de otros
            const vistaBateria = document.getElementById('vistaBateria');
            vistaBateria.textContent = "🔋 Buscando batería...";
            database.ref(`usuarios_bateria/${userID}`).on('value', (snap) => {
                const bat = snap.val();
                if (bat) {
                    const rayo = bat.cargando ? " ⚡" : "";
                    vistaBateria.textContent = `🔋 Batería: ${bat.nivel}%${rayo}`;
                    vistaBateria.style.color = bat.nivel < 20 ? "#ff4d4d" : "#4CAF50";
                } else {
                    vistaBateria.textContent = "🔋 Batería: Desconocida";
                    vistaBateria.style.color = "gray";
                }
            });

            // Mostrar Datos Extra de otros
            const vistaEstado = document.getElementById('textoEstado');
            const puntoEstado = document.getElementById('puntoEstado');
            const vistaPlat = document.getElementById('vistaPlataforma');
            const vistaClima = document.getElementById('vistaClima');

            database.ref(`usuarios_extra/${userID}`).on('value', (snap) => {
                const data = snap.val();
                if (data) {
                    if (data.online) {
                        vistaEstado.textContent = "En línea ahora";
                        puntoEstado.style.background = "#4CAF50";
                    } else {
                        const fecha = new Date(data.ultimaVez).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        vistaEstado.textContent = `Última vez: ${fecha}`;
                        puntoEstado.style.background = "gray";
                    }
                    vistaPlat.textContent = `💻 Dispositivo: ${data.plataforma}`;
                    vistaClima.textContent = `🕒 Hora local: ${data.hora}`;
                } else {
                    vistaEstado.textContent = "Estado desconocido";
                    puntoEstado.style.background = "lightgray";
                }
            });

            database.ref(`seguidores/${nombre}`).on('value', (s) => {
                const segs = s.val() || {};
                document.getElementById('countSeguidores').textContent = `${Object.keys(segs).length} seguidores 🌸`;
                const miID = miNombre.replace(/[.#$[\]]/g, "_");
                btn.textContent = segs[miID] ? "Siguiendo ✓" : "Seguir 🌸";
                btn.className = segs[miID] ? "btn-img" : "btn-main";
            });
            modal.style.display = 'flex';
        }

        function toggleSeguir() {
            const nombreDestino = document.getElementById('vistaNombre').textContent;
            const miID = miNombre.replace(/[.#$[\]]/g, "_");
            const ref = database.ref(`seguidores/${nombreDestino}/${miID}`);
            ref.get().then(snap => {
                if(snap.exists()) ref.remove(); else ref.set(true);
            });
        }

        // --- RACHAS ---
        const hitosRacha = [1, 3, 5, 7, 14, 30, 45, 60, 90, 120, 240, 365];

        function abrirModalRacha() {
            document.getElementById('modalRacha').style.display = 'flex';
            actualizarVistaRacha();
        }

        function enviarSolicitudRacha() {
            const miID = miNombre.replace(/[.#$[\]]/g, "_");
            database.ref(`chats_privados/${salaActual}/racha/solicitudes/${miID}`).set(true);
        }

        function actualizarVistaRacha() {
            database.ref(`chats_privados/${salaActual}/racha`).on('value', (snap) => {
                const racha = snap.val() || {};
                const solicitudes = racha.solicitudes || {};
                const countAceptados = Object.keys(solicitudes).length;
                const activa = racha.activa || false;
                const dias = racha.dias || 0;

                document.getElementById('rachaDias').textContent = `${dias} días 🔥`;
                const btn = document.getElementById('btnSolicitudRacha');
                const estadoText = document.getElementById('rachaEstadoText');

                if (activa) {
                    estadoText.textContent = "¡Racha activa! ✨";
                    btn.style.display = "none";
                } else {
                    estadoText.textContent = `Aceptado por ${countAceptados}/2 personas.`;
                    btn.style.display = "block";
                    if (countAceptados >= 2) {
                        database.ref(`chats_privados/${salaActual}/racha`).update({ activa: true, dias: 1, ultimaFecha: Date.now() });
                    }
                }
                dibujarLogros(dias);
            });
        }

        function dibujarLogros(dias) {
            const cont = document.getElementById('logrosContenedor');
            cont.innerHTML = "";
            hitosRacha.forEach(hito => {
                const desc = dias >= hito;
                const div = document.createElement('div');
                div.className = `logro-item ${desc ? 'desbloqueado' : ''}`;
                div.innerHTML = `<span class="logro-icon">${desc ? '🏆' : '🔒'}</span><strong>${hito} d</strong>`;
                cont.appendChild(div);
            });
        }

        // --- FONDO AJUSTADO ---
        function ajustarFondoSala(input) {
            if (input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = 1280; canvas.height = 720;
                        const ratio = Math.max(canvas.width / img.width, canvas.height / img.height);
                        const x = (canvas.width - img.width * ratio) / 2;
                        const y = (canvas.height - img.height * ratio) / 2;
                        ctx.drawImage(img, x, y, img.width * ratio, img.height * ratio);
                        database.ref(`chats_privados/${salaActual}/configuracion/fondo`).set(canvas.toDataURL('image/jpeg', 0.6));
                    };
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

                function unirseASala() {
    const codigo = document.getElementById('roomCode').value.trim().toLowerCase();
    if (!codigo) return;
    salaActual = codigo;
    document.getElementById('selector-sala').style.display = "none";
    document.getElementById('sala-info').style.display = "block";
    
    database.ref(`chats_privados/${salaActual}/configuracion`).on('value', snap => {
        const config = snap.val() || {};
        document.getElementById('tituloSala').textContent = config.nombrePersonalizado || "Sala: #" + codigo;
        if (config.fondo) document.getElementById('mensajesPrivados').style.backgroundImage = `url(${config.fondo})`;
    });

    const contenedor = document.getElementById('mensajesPrivados');
    contenedor.innerHTML = ""; // Limpiar el contenedor por si entran a otra sala

    // --- CARGA INICIAL LIMITADA (Carga los últimos 10 mensajes ordenados) ---
    database.ref(`chats_privados/${salaActual}/mensajes`)
        .orderByChild('fecha')
        .limitToLast(limiteMensajes)
        .once('value', (snapshot) => {
            const mensajes = [];
            snapshot.forEach(child => {
                mensajes.push({ id: child.key, ...child.val() });
            });

            if (mensajes.length > 0) {
                primerMensajeFecha = mensajes[0].fecha; // Guardamos el más viejo para el scroll
                
                // Los dibujamos en orden
                mensajes.forEach(msg => {
                    dibujarMensaje(msg.id, msg);
                });
            }

            // --- ESCUCHA EN TIEMPO REAL (SOLO MENSAJES NUEVOS) ---
            // Usamos una marca de tiempo actual para ignorar todo el historial pesado
            const tiempoEntrada = Date.now();
            database.ref(`chats_privados/${salaActual}/mensajes`)
                .orderByChild('fecha')
                .startAt(tiempoEntrada)
                .on('child_added', snap => {
                    const datos = snap.val();
                    // Evitamos duplicar por las dudas si coincide el milisegundo
                    if (!document.getElementById(`msg-${snap.key}`)) {
                        dibujarMensaje(snap.key, datos);
                        contenedor.scrollTop = contenedor.scrollHeight; 
                    }
                });
        });

    // Escuchar mensajes borrados en tiempo real
    database.ref(`chats_privados/${salaActual}/mensajes`).on('child_removed', snap => {
        const el = document.getElementById(`msg-${snap.key}`);
        if (el) el.remove();
    });

    // --- DETECTOR DE SCROLL HACIA ARRIBA (Paginación histórica) ---
    contenedor.addEventListener('scroll', () => {
        if (contenedor.scrollTop <= 10 && !cargandoMasChat && primerMensajeFecha) {
            cargandoMasChat = true;
            const alturaPrevia = contenedor.scrollHeight;

            database.ref(`chats_privados/${salaActual}/mensajes`)
                .orderByChild('fecha')
                .endAt(primerMensajeFecha - 1)
                .limitToLast(limiteMensajes)
                .once('value', (snapshot) => {
                    const mensajesViejos = [];
                    snapshot.forEach(child => {
                        mensajesViejos.push({ id: child.key, ...child.val() });
                    });

                    if (mensajesViejos.length > 0) {
                        primerMensajeFecha = mensajesViejos[0].fecha;

                        // Insertar arriba los mensajes antiguos usando la función auxiliar
                        mensajesViejos.reverse().forEach(msg => {
                            if (!document.getElementById(`msg-${msg.id}`)) {
                                const elementoCreado = crearEstructuraMensaje(msg.id, msg);
                                contenedor.insertBefore(elementoCreado, contenedor.firstChild);
                            }
                        });

                        contenedor.scrollTop = contenedor.scrollHeight - alturaPrevia;
                    }
                    cargandoMasChat = false;
                });
        }
    });

    // --- GENERACIÓN DE LA SALA DE CINE ---
    const inputArea = document.querySelector('.chat-input-area');
    if (inputArea && !document.getElementById('btnAbrirCine')) {
        const estructuraCine = document.createElement('div');
        estructuraCine.style = "display: flex; flex-direction: column; width: 100%; gap: 5px;";
        inputArea.parentNode.insertBefore(estructuraCine, inputArea);

        const btnCine = document.createElement('button');
        btnCine.id = 'btnAbrirCine';
        btnCine.className = 'btn-main'; 
        btnCine.style = "width: 100%; margin: 0; padding: 8px; font-size: 0.8rem; background: var(--morado-deep);";
        btnCine.innerHTML = "🎬 Sala de Cine";
        btnCine.onclick = toggleCine;
        
        estructuraCine.appendChild(btnCine);
        estructuraCine.appendChild(inputArea);
    }

    // Escuchar Firebase para el cine en tiempo real
    database.ref(`chats_privados/${salaActual}/cine`).on('value', (snap) => {
        const data = snap.val();
        if (data && data.url) {
            actualizarCine(data);
        } else {
            const panel = document.getElementById('cine-kofy');
            if (panel) panel.style.display = 'none';
            if (player) player.stopVideo();
        }
    });
}

    // Función auxiliar para generar el elemento HTML del mensaje viejo sin romper tu "dibujarMensaje"
    function crearEstructuraMensaje(id, datos) {
        const msgDiv = document.createElement('div');
        const esMio = datos.usuario === miNombre;
        msgDiv.className = `bubble ${esMio ? 'mine' : 'other'}`;
        msgDiv.id = `msg-${id}`;
        if (datos.colorBurbuja) msgDiv.style.backgroundColor = datos.colorBurbuja;
        
        msgDiv.innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 5px;">
                <div style="display: flex; align-items: center; gap: 5px;">
                    <img src="${datos.avatar}" style="width: 20px; height: 20px; border-radius: 50%; object-fit: cover;">
                    <span style="font-size: 0.65rem; font-weight: bold; cursor: pointer;" onclick="verPerfil('${datos.usuario}', '${datos.avatar}', '${datos.biografia || ''}')">${esMio ? 'Tú' : datos.usuario}</span>
                </div>
                ${esMio ? `<button onclick="borrarMensajePrivado('${id}')" style="background:none; border:none; cursor:pointer; font-size:0.7rem; opacity:0.5;">🗑️</button>` : ''}
            </div>
            ${datos.mensaje ? `<div>${datos.mensaje}</div>` : ''}
            ${datos.imagen ? `<img src="${datos.imagen}" style="width: 100%; border-radius: 10px; margin-top: 5px;">` : ''}
            <span class="msg-time">${new Date(datos.fecha).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
        `;
        return msgDiv;
    }

        function enviarMensajeSala() {
            const texto = document.getElementById('textoPrivado').value.trim();
            if (!texto) return;
            database.ref(`chats_privados/${salaActual}/mensajes`).push({
                usuario: miNombre, avatar: miAvatar, mensaje: texto, fecha: Date.now(), colorBurbuja: miColorBurbuja, biografia: localStorage.getItem('kofy_bio') || ""
            });
            document.getElementById('textoPrivado').value = "";
        }

        function cerrarVista() { document.getElementById('modalVistaPerfil').style.display = 'none'; }
        function cerrarModalRacha() { document.getElementById('modalRacha').style.display = 'none'; }
        function borrarMensajePrivado(id) { if(confirm("¿Borrar?")) database.ref(`chats_privados/${salaActual}/mensajes/${id}`).remove(); }
        function cambiarNombreSala() { const n = prompt("Nombre:"); if(n) database.ref(`chats_privados/${salaActual}/configuracion/nombrePersonalizado`).set(n); }
        function prepararImagenChat(input) { if (input.files[0]) { const reader = new FileReader(); reader.onload = (e) => comprimirYEnviarImagen(e.target.result); reader.readAsDataURL(input.files[0]); } }
        function comprimirYEnviarImagen(base64) {
            database.ref(`chats_privados/${salaActual}/mensajes`).push({
                usuario: miNombre, avatar: miAvatar, mensaje: "", imagen: base64, fecha: Date.now(), colorBurbuja: miColorBurbuja
            });
        }
    </script>

    <script>
    let player = null;
    let apiLista = false;
    let intervaloSync = null;

    // 1. Carga de API de YouTube
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function onYouTubeIframeAPIReady() { apiLista = true; }

    function toggleCine() {
        const panel = document.getElementById('cine-kofy');
        if (panel) {
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        } else {
            actualizarCine({url: null}); // Crea el panel si no existe
        }
    }

    function actualizarCine(data) {
        let cinePanel = document.getElementById('cine-kofy');
        if (!cinePanel) {
            cinePanel = document.createElement('div');
            cinePanel.id = 'cine-kofy';
            cinePanel.className = 'card';
            cinePanel.style = "margin-bottom:10px; border: 2px solid var(--lavanda); display: block;";
            cinePanel.innerHTML = `
                <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <h4 style="color:var(--morado-deep); margin:0; font-size:0.8rem;">🎬 Cine Compartido</h4>
                    <button onclick="borrarVideo()" style="background:#ff4d4d; border:none; border-radius:50%; color:white; width:22px; height:22px; cursor:pointer;">✕</button>
                </div>
                <div id="reproductor-yt" style="border-radius:10px; overflow:hidden; background:#000; height:200px;"></div>
                <div style="display:flex; gap:5px; margin-top:8px;">
                    <input type="text" id="videoUrl" placeholder="Link de YouTube..." style="flex:1; font-size:0.7rem; padding:5px; border-radius:8px; border:1px solid var(--rosa);">
                    <button class="btn-main" onclick="subirVideo()" style="padding:5px 10px; font-size:0.7rem;">Cargar</button>
                </div>
            `;
            const salaInfo = document.getElementById('sala-info');
            salaInfo.insertBefore(cinePanel, document.getElementById('mensajesPrivados'));
        }

        cinePanel.style.display = 'block';

        if (data.url && apiLista) {
            const vID = extraerID(data.url);
            if (!player) {
                player = new YT.Player('reproductor-yt', {
                    height: '200', width: '100%', videoId: vID,
                    events: { 'onStateChange': manejarCambioEstado }
                });
            } else {
                // Sincronizar tiempo y estado
                if (data.estado === "pausado") player.pauseVideo();
                else player.playVideo();

                const diff = Math.abs(player.getCurrentTime() - data.segundo);
                if (diff > 3) player.seekTo(data.segundo, true);
                
                if (player.getVideoData().video_id !== vID) player.loadVideoById(vID);
            }
        }
    }

    function manejarCambioEstado(event) {
        if (event.data === YT.PlayerState.ENDED) {
            borrarVideo();
        } else if (event.data === YT.PlayerState.PLAYING) {
            iniciarSync();
        } else if (event.data === YT.PlayerState.PAUSED) {
            database.ref(`chats_privados/${salaActual}/cine/estado`).set("pausado");
            clearInterval(intervaloSync);
        }
    }

    function iniciarSync() {
        database.ref(`chats_privados/${salaActual}/cine/estado`).set("reproduciendo");
        clearInterval(intervaloSync);
        intervaloSync = setInterval(() => {
            if (player && player.getPlayerState() === 1) {
                database.ref(`chats_privados/${salaActual}/cine/segundo`).set(player.getCurrentTime());
            }
        }, 3000);
    }

    function borrarVideo() { database.ref(`chats_privados/${salaActual}/cine`).remove(); clearInterval(intervaloSync); }
    function extraerID(url) { return url.match(/(?:youtu\.be\/|youtube\.com(?:\/embed\/|\/v\/|\/watch\?v=|\/user\/\S+|\/ytscreeningroom\?v=))([\w\-]{11})/)[1]; }
    function subirVideo() { 
        const url = document.getElementById('videoUrl').value;
        if(url) database.ref(`chats_privados/${salaActual}/cine`).set({url: url, estado: "reproduciendo", segundo: 0});
    }
</script>
