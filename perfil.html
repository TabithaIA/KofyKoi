<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <head>
    <meta charset="UTF-8">
    <title>KofyKoi - Chat y Amigos</title>
    <link rel="icon" type="image/png" href="favicon.png">
</head>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">KofyKoi</div>
        <div class="header-user">
            <span id="nav-username">@KofyUser</span>
            <img src="https://i.pravatar.cc/150?u=kofy" class="avatar-sm" id="imgNav">
        </div>
    </header>

    <div class="container">
        <aside>
    <div class="card profile-card">
        <div class="avatar-container" style="position: relative; width: 100px; height: 100px; margin: 0 auto;">
            <img src="https://i.pravatar.cc/150?u=kofy" class="avatar-lg" id="imgPerfil" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">
            <img id="marcoPerfil" src="" style="display: none; position: absolute; top: -5px; left: -5px; width: 110px; height: 110px; pointer-events: none; z-index: 10;">
        </div>
        <h3 id="nombrePerfil" style="font-size: 0.9rem; margin-top: 10px;">@KofyLover</h3>
        
        <div class="follow-counters" style="display: flex; justify-content: center; gap: 15px; margin: 10px 0; font-size: 0.8rem; font-weight: bold;">
            <span id="misSeguidoresCount" style="color: var(--morado-deep); cursor: pointer;" onclick="abrirModalRelaciones('seguidores')">- seguidores</span>
            <span id="misSeguidosCount" style="color: var(--morado-deep); cursor: pointer;" onclick="abrirModalRelaciones('seguidos')">- seguidos</span>
        </div>
        
        <p id="bioPerfil" style="font-size: 0.9rem; margin-top: 5px;">Buscando momentos zen y mucho café. ✨</p>
        <br>
        <button class="btn-main" onclick="abrirModal()">Editar Perfil</button>
    </div>
</aside>
    </div>

    <div id="modalPerfil" class="modal">
        <div class="modal-content">
            <h3 style="color: var(--morado-deep)">Configurar Perfil 🌸</h3>
            <br>
            <img src="https://i.pravatar.cc/150?u=kofy" id="previewPerfil" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover;">
            <br>
            <input type="file" id="editAvatar" accept="image/*" style="display: none;" onchange="previewImagen(this)">
            <button class="btn-img" style="margin: 10px 0;" onclick="document.getElementById('editAvatar').click()">Cambiar Foto de Perfil</button>
            
            <input type="text" id="editNombre" placeholder="Nombre de usuario">
            <textarea id="editBio" placeholder="Tu brillante biografía..." rows="3" style="border: 1px solid #ddd;"></textarea>
            
            <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
                <button class="btn-img" onclick="cerrarModal()" style="background: #eee;">Cancelar</button>
                <button class="btn-main" onclick="guardarPerfil()">Guardar Cambios</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
    <button class="nav-item main-btn" onclick="location.href='perfil.html'">
        <span>👤</span>
        <small>Perfil</small>
    </button>

    <button class="nav-item" onclick="location.href='chats.html'">
        <span>💬</span>
        <small>Chats</small>
    </button>

    <button class="nav-item" onclick="location.href='notificaciones.html'">
        <span>🔔</span>
        <small>Alertas</small>
    </button>

    <button class="nav-item" onclick="location.href='index.html'">
        <span>🏠</span>
        <small>Inicio</small>
    </button>

    <button class="nav-item" onclick="location.href='tienda.html'">
        <span>🏪</span>
        <small>Tienda</small>
    </button>

    <button class="nav-item" onclick="location.href='datos.html'">
        <span>❕</span>
        <small>Info</small>
    </button>
</nav>

<div id="modalVistaPerfil" class="modal">
    <div class="modal-content">
        <img src="" id="vistaImg" class="avatar-lg">
        <h2 id="vistaNombre" style="margin-top:10px;"></h2>
        
        <p id="countSeguidores" style="font-weight: bold; color: var(--morado-deep); margin-bottom: 10px;">0 seguidores</p>
        
        <p id="vistaBio" style="font-style: italic; color: gray; margin: 15px 0;"></p>
        
        <button id="btnSeguir" class="btn-main" onclick="seguirUsuario(document.getElementById('vistaNombre').textContent)">
            Seguir 🌸
        </button>
        
        <button class="btn-img" onclick="cerrarVista()" style="margin-top: 10px;">Cerrar</button>
    </div>
</div>

<div id="modalRelaciones" class="modal">
    <div class="modal-content" style="max-height: 400px; display: flex; flex-direction: column;">
        <h3 id="tituloRelaciones" style="color: var(--morado-deep); margin-bottom: 15px;">Usuarios 🌸</h3>
        
        <div id="listaRelaciones" style="flex: 1; overflow-y: auto; text-align: left; padding-right: 5px; margin-bottom: 15px;">
            </div>
        
        <button class="btn-img" onclick="cerrarModalRelaciones()" style="width: 100%;">Cerrar</button>
    </div>
</div>

</body>
</html>
