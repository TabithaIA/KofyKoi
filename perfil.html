<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KofyKoi</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">KofyKoi</div>
        <p>v1.1</p>
        <div class="header-user">
            <span id="nav-username">@KofyUser</span>
            <img src="https://i.pravatar.cc/150?u=kofy" class="avatar-sm" id="imgNav">
        </div>
    </header>

    <div class="container">
        <aside>
    <div class="card profile-card">
        <img src="https://i.pravatar.cc/150?u=kofy" class="avatar-lg" id="imgPerfil">
        <h3 id="nombrePerfil" style="font-size: 0.9rem; margin-top: 5px;">@KofyLover</h3>
        
        <p id="misSeguidoresCount" style="font-size: 0.8rem; font-weight: bold; color: var(--morado-deep);">0 seguidores</p>
        
        <p id="bioPerfil" style="font-size: 0.9rem; margin-top: 5px;">Buscando momentos zen y mucho café. ✨</p>
        <br>
        <button class="btn-main" onclick="abrirModal()">Editar Perfil</button>
    </div>
</aside>

        <main>
            <div class="card">
                <textarea id="postText" rows="2" placeholder="¿Qué hay de nuevo en tu mundo koi?"></textarea>
                <div class="post-options">
                    <input type="file" id="postImage" accept="image/*" style="display: none;">
                    
                    <button class="btn-main" onclick="publicar()">Publicar</button>
                </div>
            </div>
            <div id="feed-container"></div>
        </main>

        <aside class="sidebar">
            <div class="card">
                <h4 style="color: var(--morado-deep)">Trending 🌸</h4>
                <ul style="list-style: none; margin-top: 10px; font-size: 0.9rem;">
                    <li style="margin-bottom: 10px;">#PecesKoi 🎏</li>
                    <li style="margin-bottom: 10px;">#CaféPastel ☕</li>
                    <li style="margin-bottom: 10px;">#MomentosZen 🧘</li>
                </ul>
            </div>
        </aside>
    </div>

    <div id="modalPerfil" class="modal">
        <div class="modal-content">
            <h3 style="color: var(--morado-deep)">Configurar Perfil 🌸</h3>
            <br>
            <img src="https://i.pravatar.cc/150?u=kofy" id="previewPerfil" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover;">
            <br>
            <input type="file" id="editAvatar" accept="image/*" style="display: none;" onchange="previewImagen(this)">
            <button class="btn-img" style="margin: 10px 0;" onclick="document.getElementById('editAvatar').click()">Cambiar Foto de Perfil</button>
            
            <input type="text" id="editNombre" placeholder="Nombre de usuario">
            <textarea id="editBio" placeholder="Tu brillante biografía..." rows="3" style="border: 1px solid #ddd;"></textarea>
            
            <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
                <button class="btn-img" onclick="cerrarModal()" style="background: #eee;">Cancelar</button>
                <button class="btn-main" onclick="guardarPerfil()">Guardar Cambios</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
    <button class="nav-item main-btn" onclick="location.href='perfil.html'">
        <span>👤</span>
        <small>Perfil</small>
    </button>

        <button class="nav-item" onclick="location.href='botellas.html'">
        <span>🍾</span>
        <small>Mar de Botellas</small>
    </button>

    <button class="nav-item" onclick="location.href='index.html'">
        <span>🏠</span>
        <small>Inicio</small>
    </button>
</nav>

<div id="modalVistaPerfil" class="modal">
    <div class="modal-content">
        <img src="" id="vistaImg" class="avatar-lg">
        <h2 id="vistaNombre" style="margin-top:10px;"></h2>
        
        <p id="countSeguidores" style="font-weight: bold; color: var(--morado-deep); margin-bottom: 10px;">0 seguidores</p>
        
        <p id="vistaBio" style="font-style: italic; color: gray; margin: 15px 0;"></p>
        
        <button id="btnSeguir" class="btn-main" onclick="seguirUsuario(document.getElementById('vistaNombre').textContent)">
            Seguir 🌸
        </button>
        
        <button class="btn-img" onclick="cerrarVista()" style="margin-top: 10px;">Cerrar</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

  // Esta es la variable mágica que usaremos en script.js
  const database = firebase.database();

    <script src="script.js"></script>
</body>
</html>
