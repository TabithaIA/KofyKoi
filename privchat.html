<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KofyKoi - Chats Privados</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght=400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .chat-layout {
            display: grid;
            grid-template-columns: 1fr;
            max-width: 600px;
            margin: 0 auto;
            height: calc(100vh - 160px);
        }
        .chat-box {
            display: flex;
            flex-direction: column;
            background: var(--blanco);
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        .chat-header {
            background: var(--lavanda);
            padding: 15px;
            font-weight: 600;
            color: var(--oscuro-suave);
            text-align: center;
            border-bottom: 2px solid var(--rosa);
        }
        .messages-container {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #fafcff;
        }
        .msg {
            padding: 10px 14px;
            border-radius: 18px;
            max-width: 75%;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            position: relative;
            word-break: break-word;
            animation: aparecerSuave 0.3s ease forwards;
            transition: transform 0.2s;
        }
        .msg.me {
            background: var(--rosa);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            cursor: pointer;
        }
        .msg.me:hover {
            transform: scale(1.02);
            filter: brightness(0.98);
        }
        .msg.other {
            background: var(--azul-claro);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .msg-text {
            margin-bottom: 2px;
            padding-right: 20px;
        }
        .msg-time {
            font-size: 0.65rem;
            color: rgba(54, 69, 79, 0.6);
            align-self: flex-end;
            margin-top: 2px;
            user-select: none;
        }
        .chat-input-area {
            display: flex;
            padding: 10px;
            background: var(--blanco);
            border-top: 1px solid #eee;
            gap: 8px;
        }
        .chat-input-area input {
            flex: 1;
            border: 1px solid var(--azul-claro);
            border-radius: 15px;
            padding: 10px 15px;
            font-family: inherit;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">KofyKoi</div>
    <div class="header-user">
        <span id="nav-username">@KofyUser</span>
        <img src="https://i.pravatar.cc/150?u=kofy" class="avatar-sm" id="imgNav">
    </div>
</header>

<div class="container" style="display: block; padding-top: 10px;">
    <div class="chat-layout">
        <div class="chat-box">
            <div class="chat-header" id="chat-with-title">
                💬 Selecciona un usuario desde su perfil
            </div>
            <div class="messages-container" id="messages-container">
                <p style="text-align: center; color: gray; font-size: 0.85rem; margin-top: 20px;">
                    Entra al perfil de alguien en el inicio y pulsa "Enviar Mensaje" para abrir un chat zen privado.
                </p>
            </div>
            <div class="chat-input-area">
                <input type="text" id="msgInput" placeholder="Escribe un mensaje privado..." disabled>
                <button class="btn-main" id="btnEnviarMsg" onclick="enviarMensajePrivado()" style="border-radius: 15px;" disabled>Enviar</button>
            </div>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <button class="nav-item" onclick="location.href='perfil.html'">
        <span>👤</span>
        <small>Perfil</small>
    </button>
    <button class="nav-item" onclick="location.href='chats.html'" style="color: var(--rosa);">
        <span>💬</span>
        <small>Chats</small>
    </button>
    <button class="nav-item main-btn" onclick="location.href='index.html'">
        <span>🏠</span>
        <small>Inicio</small>
    </button>
    <button class="nav-item" onclick="location.href='botellas.html'">
        <span>🍾</span>
        <small>Botellas</small>
    </button>
    <button class="nav-item" onclick="location.href='datos.html'">
        <span>❕</span>
        <small>Info</small>
    </button>
</nav>
